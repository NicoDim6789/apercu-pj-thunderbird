<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Impression — Aperçu PJ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; }
#status { padding: 20px; font-family: sans-serif; color: #555; font-size: 14px; }
.page { display: block; width: 100%; }
.page img { width: 100%; height: auto; display: block; }
@media print {
  #status { display: none !important; }
  .page { page-break-after: always; }
  .page:last-child { page-break-after: avoid; }
}
</style>
</head>
<body>
<div id="status">Préparation de l'impression…</div>
<script type="module">
const key  = new URLSearchParams(location.search).get("k");
const status = document.getElementById("status");

if (!key) {
  status.textContent = "Erreur : paramètre manquant.";
} else {
  const storeKey = "apj_print_" + key;
  let res;
  try { res = await browser.storage.local.get({ [storeKey]: null }); }
  catch (_) { res = {}; }
  const pages = res[storeKey];
  browser.storage.local.remove(storeKey).catch(() => {});

  if (!pages?.length) {
    status.textContent = "Données d'impression introuvables — fermez cette fenêtre.";
  } else {
    status.remove();
    const frag = document.createDocumentFragment();
    for (const dataUrl of pages) {
      const div = document.createElement("div");
      div.className = "page";
      const img = new Image();
      img.src = dataUrl;
      div.appendChild(img);
      frag.appendChild(div);
    }
    document.body.appendChild(frag);

    // Attendre que toutes les images soient chargées avant d'imprimer.
    const imgs = [...document.querySelectorAll("img")];
    let pending = imgs.filter(i => !i.complete).length;
    function tryPrint() {
      if (pending <= 0) setTimeout(() => window.print(), 200);
    }
    if (pending === 0) {
      tryPrint();
    } else {
      imgs.forEach(img => {
        if (!img.complete) {
          img.addEventListener("load",  () => { pending--; tryPrint(); }, { once: true });
          img.addEventListener("error", () => { pending--; tryPrint(); }, { once: true });
        }
      });
    }

    // Fermer automatiquement après impression (ou annulation).
    window.addEventListener("afterprint", () => setTimeout(() => window.close(), 400));
  }
}
</script>
</body>
</html>

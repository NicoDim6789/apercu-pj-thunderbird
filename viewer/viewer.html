<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Aperçu PJ</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="root">
    <!-- Colonne gauche : liste verticale des PDFs du mail -->
    <aside id="pdf-list" aria-label="Liste des PDF du message"></aside>

    <!-- Colonne droite : toolbar + zone de rendu -->
    <main id="main">
      <div id="toolbar" role="toolbar" aria-label="Actions sur le PDF">
        <div id="toolbar-nav">
          <button type="button" id="btn-prev" title="Page précédente">◀</button>
          <span id="page-indicator">
            <input type="number" id="page-input" min="1" value="1" aria-label="Numéro de page">
            <span id="page-total">/ 0</span>
          </span>
          <button type="button" id="btn-next" title="Page suivante">▶</button>
        </div>
        <div id="toolbar-zoom">
          <button type="button" id="btn-zoom-out" title="Zoom −">−</button>
          <select id="zoom-select" aria-label="Niveau de zoom">
            <option value="fit-width" selected>Ajuster largeur</option>
            <option value="0.5">50 %</option>
            <option value="0.75">75 %</option>
            <option value="1">100 %</option>
            <option value="1.25">125 %</option>
            <option value="1.5">150 %</option>
            <option value="2">200 %</option>
          </select>
          <button type="button" id="btn-zoom-in" title="Zoom +">+</button>
        </div>
        <div id="toolbar-actions">
          <!-- Boutons issus du registre d'actions (print, archive, ccm, …) -->
        </div>
      </div>

      <div id="render-area">
        <div id="empty-state">Aucun PDF à afficher.</div>
        <div id="size-guard" hidden>
          <p id="size-guard-msg"></p>
          <button type="button" id="size-guard-load">Charger l'aperçu</button>
        </div>
        <canvas id="pdf-canvas" hidden></canvas>
        <div id="loading" hidden>Chargement…</div>
        <div id="error" hidden></div>
      </div>
    </main>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Aperçu PJ</title>
  <link rel="stylesheet" href="../vendor/pdfjs/web/pdf_viewer.css">
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="root">

    <!-- Panneau gauche : liste des pièces jointes -->
    <aside id="pdf-list" aria-label="Pièces jointes du message"></aside>

    <!-- Rail de vignettes de pages -->
    <aside id="thumb-rail" aria-label="Vignettes des pages" hidden></aside>

    <main id="main">

      <!-- ===== Barre d'outils 2 rangées ===== -->
      <div id="toolbar" role="toolbar" aria-label="Actions">

        <!-- Rangée 1 : navigation + zoom + palette -->
        <div id="tb-row1">

          <div id="toolbar-nav">
            <button type="button" id="btn-thumbs" title="Vignettes (T)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
                <rect x="0.7" y="0.7" width="5.6" height="5.6" rx="1.2" fill="currentColor"/>
                <rect x="8.7" y="0.7" width="5.6" height="5.6" rx="1.2" fill="currentColor"/>
                <rect x="0.7" y="8.7" width="5.6" height="5.6" rx="1.2" fill="currentColor"/>
                <rect x="8.7" y="8.7" width="5.6" height="5.6" rx="1.2" fill="currentColor"/>
              </svg>
            </button>
            <div class="tb-divider"></div>
            <button type="button" id="btn-prev" title="Page précédente (←)">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M9 2L5 7L9 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <span id="page-indicator">
              <input type="number" id="page-input" min="1" value="1" aria-label="Numéro de page">
              <span id="page-total">/ 0</span>
            </span>
            <button type="button" id="btn-next" title="Page suivante (→)">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M5 2L9 7L5 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div class="tb-divider"></div>

          <div id="toolbar-zoom">
            <button type="button" id="btn-zoom-out" title="Zoom arrière (−)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
                <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M5 7H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M10.5 10.5L13.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <select id="zoom-select" aria-label="Niveau de zoom">
              <option value="auto">Auto</option>
              <option value="page-width" selected>Largeur</option>
              <option value="page-fit">Page entière</option>
              <option value="0.5">50 %</option>
              <option value="0.75">75 %</option>
              <option value="1">100 %</option>
              <option value="1.25">125 %</option>
              <option value="1.5">150 %</option>
              <option value="2">200 %</option>
            </select>
            <button type="button" id="btn-zoom-in" title="Zoom avant (+)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
                <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 5V9M5 7H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M10.5 10.5L13.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="tb-divider"></div>
            <button type="button" id="btn-rotate" title="Pivoter (R)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
                <path d="M11.5 5C10.3 3.2 8.3 2 6 2C2.7 2 0 4.7 0 8C0 11.3 2.7 14 6 14C8.7 14 11 12.3 11.9 9.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M12 2L15 5.5L11.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button type="button" id="btn-find" title="Rechercher dans le PDF (Ctrl+F)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
                <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>

          <!-- Espace flexible + bouton palette -->
          <div class="tb-flex-spacer"></div>
          <button type="button" id="btn-cmd-palette" title="Palette de commandes (Ctrl+K)">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
              <rect x="0.6" y="1.2" width="3.2" height="2.4" rx="0.7" stroke="currentColor" stroke-width="1.1"/>
              <rect x="4.9" y="1.2" width="3.2" height="2.4" rx="0.7" stroke="currentColor" stroke-width="1.1"/>
              <rect x="9.2" y="1.2" width="3.2" height="2.4" rx="0.7" stroke="currentColor" stroke-width="1.1"/>
              <rect x="0.6" y="5.2" width="3.2" height="2.4" rx="0.7" stroke="currentColor" stroke-width="1.1"/>
              <rect x="4.9" y="5.2" width="7.5" height="2.4" rx="0.7" stroke="currentColor" stroke-width="1.1"/>
              <rect x="0.6" y="9.4" width="5.2" height="2.4" rx="0.7" stroke="currentColor" stroke-width="1.1"/>
              <rect x="7.4" y="9.4" width="5.2" height="2.4" rx="0.7" stroke="currentColor" stroke-width="1.1"/>
            </svg>
            <span>Commandes</span>
          </button>
        </div>

        <!-- Rangée 2 : boutons d'action (registre toolbar) -->
        <div id="toolbar-actions"></div>

      </div><!-- /#toolbar -->

      <!-- ===== Barre de recherche ===== -->
      <div id="findbar" hidden>
        <svg class="find-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 10L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="find-input" placeholder="Rechercher dans le PDF…" aria-label="Rechercher dans le PDF">
        <button type="button" id="find-prev" title="Occurrence précédente (Maj+Entrée)">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
            <path d="M7.5 2L4 5.5L7.5 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button type="button" id="find-next" title="Occurrence suivante (Entrée)">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
            <path d="M3.5 2L7 5.5L3.5 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span id="find-count" aria-live="polite"></span>
        <button type="button" id="find-close" title="Fermer (Échap)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M2.5 2.5L9.5 9.5M9.5 2.5L2.5 9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- ===== Zone de rendu ===== -->
      <div id="render-area">
        <div id="viewerContainer" hidden>
          <div id="viewer" class="pdfViewer"></div>
        </div>
        <div id="image-view" hidden>
          <img id="image-el" alt="">
        </div>
        <div id="empty-state">Aucune pièce jointe affichable dans ce message.</div>
        <div id="loading" hidden>
          <div class="loading-ring"></div>
          <span>Chargement…</span>
        </div>
        <div id="error" hidden></div>
      </div>

    </main>
  </div>

  <!-- ===== Palette de commandes (Ctrl+K) ===== -->
  <div id="cmd-palette" hidden>
    <div id="cmd-backdrop"></div>
    <div id="cmd-dialog" role="dialog" aria-modal="true" aria-label="Palette de commandes">
      <div id="cmd-search-wrapper">
        <svg id="cmd-search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7.5" cy="7.5" r="5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M11.5 11.5L14.5 14.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input type="text" id="cmd-input" placeholder="Taper une commande…" autocomplete="off" spellcheck="false">
        <kbd class="cmd-kbd-badge">Échap</kbd>
      </div>
      <ul id="cmd-list" role="listbox"></ul>
      <div id="cmd-footer">
        <span><kbd>↑↓</kbd> Naviguer</span>
        <span><kbd>↵</kbd> Exécuter</span>
        <span><kbd>Échap</kbd> Fermer</span>
      </div>
    </div>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>

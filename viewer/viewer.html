<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Aperçu PJ</title>
  <!-- CSS officiel des composants PDF.js (pages, couche texte, surlignage recherche) -->
  <link rel="stylesheet" href="../vendor/pdfjs/web/pdf_viewer.css">
  <!-- Nos surcharges / mise en page : chargé après pour gagner en spécificité -->
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="root">
    <!-- Liste des pièces jointes affichables du message (PDF + images) -->
    <aside id="pdf-list" aria-label="Pièces jointes du message"></aside>

    <!-- Vignettes des pages du PDF actif (A2) — masquées par défaut -->
    <aside id="thumb-rail" aria-label="Vignettes des pages" hidden></aside>

    <main id="main">
      <div id="toolbar" role="toolbar" aria-label="Actions">
        <div id="toolbar-nav">
          <button type="button" id="btn-thumbs" title="Afficher/masquer les vignettes">▦</button>
          <button type="button" id="btn-prev" title="Page précédente">◀</button>
          <span id="page-indicator">
            <input type="number" id="page-input" min="1" value="1" aria-label="Numéro de page">
            <span id="page-total">/ 0</span>
          </span>
          <button type="button" id="btn-next" title="Page suivante">▶</button>
        </div>
        <div id="toolbar-zoom">
          <button type="button" id="btn-zoom-out" title="Zoom −">−</button>
          <select id="zoom-select" aria-label="Niveau de zoom">
            <option value="auto">Auto</option>
            <option value="page-width" selected>Largeur</option>
            <option value="page-fit">Page entière</option>
            <option value="0.5">50 %</option>
            <option value="0.75">75 %</option>
            <option value="1">100 %</option>
            <option value="1.25">125 %</option>
            <option value="1.5">150 %</option>
            <option value="2">200 %</option>
          </select>
          <button type="button" id="btn-zoom-in" title="Zoom +">+</button>
          <button type="button" id="btn-rotate" title="Pivoter (sens horaire)">⟳</button>
          <button type="button" id="btn-find" title="Rechercher (Ctrl+F)">🔍</button>
        </div>
        <div id="toolbar-actions">
          <!-- Boutons via le registre d'actions (print, et plus tard download, archive, ccm…) -->
        </div>
      </div>

      <!-- Barre de recherche dans le PDF (A3) — masquée par défaut -->
      <div id="findbar" hidden>
        <input type="text" id="find-input" placeholder="Rechercher dans le PDF…" aria-label="Rechercher dans le PDF">
        <button type="button" id="find-prev" title="Occurrence précédente">◀</button>
        <button type="button" id="find-next" title="Occurrence suivante">▶</button>
        <span id="find-count" aria-live="polite"></span>
        <button type="button" id="find-close" title="Fermer la recherche">✕</button>
      </div>

      <div id="render-area">
        <!-- Viewer PDF.js : scroll continu multi-pages (A1) -->
        <div id="viewerContainer" hidden>
          <div id="viewer" class="pdfViewer"></div>
        </div>

        <!-- Aperçu image (D1) -->
        <div id="image-view" hidden>
          <img id="image-el" alt="">
        </div>

        <div id="empty-state">Aucune pièce jointe affichable dans ce message.</div>
        <div id="loading" hidden>Chargement…</div>
        <div id="error" hidden></div>
      </div>
    </main>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
